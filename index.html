<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistema de Inventario - Documentación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor principal con efecto glassmorphism */
        .container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            backdrop-filter: blur(2px);
            transition: all 0.3s ease;
        }

        /* Encabezado con gradiente */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 2rem 2rem 1.8rem 2rem;
            text-align: center;
            border-bottom: 4px solid #f59e0b;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header h1::before {
            content: "📊";
            font-size: 2rem;
        }

        .header h1::after {
            content: "📋";
            font-size: 2rem;
        }

        .header p {
            color: #cbd5e1;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Navegación tipo pestañas */
        .nav-tabs {
            display: flex;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 1.5rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 1rem 1.8rem;
            font-size: 1rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 12px 12px 0 0;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
            position: relative;
        }

        .tab-btn i {
            font-style: normal;
            font-size: 1.2rem;
        }

        .tab-btn:hover {
            background: #eef2ff;
            color: #4f46e5;
        }

        .tab-btn.active {
            color: #4f46e5;
            background: white;
            border-bottom: 3px solid #4f46e5;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: #4f46e5;
            border-radius: 3px 3px 0 0;
        }

        /* Contenedor del iframe */
        .iframe-container {
            background: white;
            padding: 0;
            height: calc(100vh - 220px);
            min-height: 550px;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #fefefe;
        }

        /* Loader mientras carga el iframe */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            background: white;
            padding: 20px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
            color: #4f46e5;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Pie de página */
        .footer {
            background: #f1f5f9;
            padding: 1rem;
            text-align: center;
            color: #475569;
            font-size: 0.85rem;
            border-top: 1px solid #e2e8f0;
        }

        /* Botones de control adicionales (responsive) */
        .controls {
            background: white;
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            border-bottom: 1px solid #eef2ff;
        }

        .control-btn {
            background: #f1f5f9;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .control-btn:hover {
            background: #e2e8f0;
            transform: scale(0.96);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.6rem;
            }
            .header p {
                font-size: 0.9rem;
            }
            .tab-btn {
                padding: 0.7rem 1.2rem;
                font-size: 0.85rem;
            }
            .iframe-container {
                height: calc(100vh - 200px);
                min-height: 450px;
            }
            .controls {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .nav-tabs {
                justify-content: center;
            }
            .tab-btn {
                flex: 1;
                justify-content: center;
            }
        }

        /* Estilos para mensaje de error */
        .error-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: #fef2f2;
            color: #991b1b;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Documentación del Sistema</h1>
            <p>Modelado de requisitos - Actores, Casos de Uso y Diagrama UML</p>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" data-page="actores">
                <i>👥</i> Actores del Sistema
            </button>
            <button class="tab-btn" data-page="casos">
                <i>📝</i> Casos de Uso
            </button>
            <button class="tab-btn" data-page="uml">
                <i>🔷</i> Diagrama UML
            </button>
        </div>

        <div class="controls">
            <button class="control-btn" id="refreshBtn" title="Recargar página actual">
                🔄 Recargar
            </button>
            <button class="control-btn" id="fullscreenBtn" title="Pantalla completa (iframe)">
                🖥️ Expandir vista
            </button>
        </div>

        <div class="iframe-container" id="iframeContainer">
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <span>Cargando contenido...</span>
            </div>
            <iframe id="contentFrame" src="hoja1_actores.html" title="Vista de documentación"></iframe>
        </div>

        <div class="footer">
            <span>📌 Navegación integrada • Diseño unificado • Diagramas y especificaciones</span>
        </div>
    </div>

    <script>
        // Mapeo de páginas a rutas reales
        const pages = {
            actores: 'hoja1_actores.html',
            casos: 'hoja2_casos_de_uso.html',
            uml: 'hoja3_diagrama_uml.html'
        };

        // Elementos del DOM
        const iframe = document.getElementById('contentFrame');
        const loader = document.getElementById('loader');
        const tabs = document.querySelectorAll('.tab-btn');
        const refreshBtn = document.getElementById('refreshBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        let currentPage = 'actores';

        // Función para mostrar loader y cambiar src del iframe
        function loadPage(pageKey) {
            const url = pages[pageKey];
            if (!url) {
                console.error('Página no definida:', pageKey);
                return;
            }

            // Mostrar loader
            loader.classList.remove('hidden');
            
            // Pequeño retraso para que el loader sea visible (mejor UX)
            iframe.style.opacity = '0.6';
            
            // Cambiar el src del iframe
            iframe.src = url;
            
            // Actualizar estado del tab activo
            tabs.forEach(tab => {
                if (tab.getAttribute('data-page') === pageKey) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
            
            currentPage = pageKey;
        }

        // Evento cuando el iframe termina de cargar
        iframe.addEventListener('load', function() {
            loader.classList.add('hidden');
            iframe.style.opacity = '1';
            
            // Intentar ajustar altura del iframe al contenido (opcional)
            try {
                // Si el contenido del iframe está en el mismo origen, podemos ajustar altura
                // Pero como es un HTML local, esto funciona sin problemas de CORS
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (iframeDoc && iframeDoc.body.scrollHeight) {
                    // No forzamos altura para mantener consistencia con el diseño general
                    // pero se puede dejar el tamaño fijo definido en CSS
                }
            } catch(e) {
                // Si hay error por política de seguridad, ignoramos
                console.log("No se pudo acceder al contenido interno del iframe (posiblemente seguro)");
            }
        });

        // Manejar errores de carga del iframe (por si los archivos no existen)
        iframe.addEventListener('error', function() {
            loader.classList.add('hidden');
            iframe.style.opacity = '1';
            // Mostrar mensaje de error amigable dentro del iframe (solo si es posible)
            // Pero como no podemos modificar directamente el contenido, inyectamos un error visual
            const errorHtml = `
                <html>
                <head><style>body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#fef2f2;color:#991b1b;text-align:center;padding:20px;}</style></head>
                <body>
                    <div>
                        <h2>⚠️ Error al cargar la página</h2>
                        <p>No se pudo encontrar <strong>${pages[currentPage]}</strong>.<br>
                        Asegúrate de que los archivos <strong>hoja1_actores.html</strong>, <strong>hoja2_casos_de_uso.html</strong> y <strong>hoja3_diagrama_uml.html</strong> estén en la misma carpeta que este index.html.</p>
                        <p>📁 Estructura esperada:</p>
                        <pre style="background:#eee;padding:10px;border-radius:8px;display:inline-block;text-align:left">
/index.html
/hoja1_actores.html
/hoja2_casos_de_uso.html
/hoja3_diagrama_uml.html
                        </pre>
                    </div>
                </body>
                </html>
            `;
            // Intentamos escribir en el iframe como fallback
            try {
                iframe.contentDocument.write(errorHtml);
                iframe.contentDocument.close();
            } catch(e) {
                // Si no se puede, al menos el loader desaparece
            }
        });

        // Eventos de los tabs
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                const page = this.getAttribute('data-page');
                if (page === currentPage) return; // ya estamos en esa página
                loadPage(page);
            });
        });

        // Botón refrescar: recarga la página actual en el iframe
        refreshBtn.addEventListener('click', function() {
            // Recargar manteniendo la misma URL
            const currentUrl = iframe.src;
            if (currentUrl) {
                loader.classList.remove('hidden');
                iframe.style.opacity = '0.6';
                iframe.src = currentUrl;
            }
        });

        // Botón expandir vista: toggle entre vista normal y una ventana emergente (opcional)
        fullscreenBtn.addEventListener('click', function() {
            const iframeContainer = document.querySelector('.iframe-container');
            if (!document.fullscreenElement) {
                // Expandir el contenedor del iframe a pantalla completa
                iframeContainer.requestFullscreen().catch(err => {
                    console.warn(`Error al intentar pantalla completa: ${err.message}`);
                    // Fallback: abrir en nueva pestaña
                    window.open(iframe.src, '_blank');
                });
            } else {
                document.exitFullscreen();
            }
        });

        // Detectar cambios en fullscreen para ajustar estilo opcional
        document.addEventListener('fullscreenchange', () => {
            const container = document.querySelector('.iframe-container');
            if (document.fullscreenElement) {
                container.style.height = '100vh';
                container.style.borderRadius = '0';
            } else {
                container.style.height = 'calc(100vh - 220px)';
                container.style.minHeight = '550px';
                container.style.borderRadius = '0';
            }
        });

        // Inicialización: cargar la página por defecto (actores)
        // Verificar si los archivos existen silenciosamente (no podemos hacer fetch por CORS local)
        // Pero mostramos mensaje amigable si el iframe no carga.
        
        // Pre-cargar listener adicional para asegurar que si el iframe tarda mucho, ocultar loader igual
        setTimeout(() => {
            if (!loader.classList.contains('hidden')) {
                // Si después de 3 seg sigue cargando, ocultamos loader (posiblemente ya cargado pero el evento falló)
                loader.classList.add('hidden');
                iframe.style.opacity = '1';
            }
        }, 3000);
        
        // Por si la carga del iframe no dispara el evento load (por redirección o error)
        window.addEventListener('load', () => {
            // Asegurar que el loader desaparezca después de la carga total de la ventana
            setTimeout(() => {
                if (!loader.classList.contains('hidden')) {
                    loader.classList.add('hidden');
                    iframe.style.opacity = '1';
                }
            }, 500);
        });
        
        // Pequeño helper para verificar la existencia previa de archivos (no bloqueante)
        function checkFiles() {
            const filesToCheck = ['hoja1_actores.html', 'hoja2_casos_de_uso.html', 'hoja3_diagrama_uml.html'];
            filesToCheck.forEach(file => {
                fetch(file, { method: 'HEAD', cache: 'no-store' })
                    .then(response => {
                        if (!response.ok) {
                            console.warn(`⚠️ El archivo ${file} no se encuentra en el servidor. Verifica su existencia.`);
                        }
                    })
                    .catch(() => {
                        console.warn(`⚠️ No se pudo acceder a ${file}. Asegúrate de que esté en la misma carpeta.`);
                    });
            });
        }
        
        // Ejecutar verificación solo si estamos en un servidor local (no interfiere con file://)
        if (window.location.protocol !== 'file:') {
            checkFiles();
        } else {
            console.log("Modo archivo local: asegúrate manualmente que los 3 archivos HTML existan junto al index.");
        }
        
        // Añadir estilos de transición al iframe
        iframe.style.transition = 'opacity 0.2s ease';
        
        // Mostrar página activa al inicio
        loadPage('actores');
    </script>
</body>
</html>
