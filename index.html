
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Sistema de Inventario - Documentación</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* CONTENEDOR */

.container{
max-width:1300px;
width:100%;
background:rgba(255,255,255,0.95);
border-radius:32px;
box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);
overflow:hidden;
backdrop-filter:blur(2px);
transition:all .3s ease;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);
color:white;
padding:2rem;
text-align:center;
border-bottom:4px solid #f59e0b;
}

.header h1{
font-size:2.5rem;
font-weight:700;
letter-spacing:-0.5px;
margin-bottom:.5rem;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
flex-wrap:wrap;
}

.header h1::before{
content:"📊";
font-size:2rem;
}

.header h1::after{
content:"📋";
font-size:2rem;
}

.header p{
color:#cbd5e1;
font-size:1.1rem;
max-width:600px;
margin:0 auto;
}

/* AUTOR */

.author{
margin-top:10px;
font-size:1rem;
font-weight:600;
color:#f59e0b;
letter-spacing:.4px;
}

/* TABS */

.nav-tabs{
display:flex;
background:#f8fafc;
border-bottom:1px solid #e2e8f0;
padding:0 1.5rem;
gap:.5rem;
flex-wrap:wrap;
}

.tab-btn{
background:transparent;
border:none;
padding:1rem 1.8rem;
font-size:1rem;
font-weight:600;
color:#475569;
cursor:pointer;
transition:.2s;
border-radius:12px 12px 0 0;
display:inline-flex;
align-items:center;
gap:10px;
font-family:inherit;
position:relative;
}

.tab-btn:hover{
background:#eef2ff;
color:#4f46e5;
}

.tab-btn.active{
color:#4f46e5;
background:white;
border-bottom:3px solid #4f46e5;
}

/* CONTROLES */

.controls{
background:white;
padding:.75rem 1.5rem;
display:flex;
justify-content:flex-end;
gap:12px;
border-bottom:1px solid #eef2ff;
}

.control-btn{
background:#f1f5f9;
border:none;
padding:6px 12px;
border-radius:20px;
font-size:.8rem;
cursor:pointer;
transition:.2s;
font-weight:500;
display:inline-flex;
align-items:center;
gap:5px;
}

.control-btn:hover{
background:#e2e8f0;
transform:scale(.96);
}

/* IFRAME */

.iframe-container{
background:white;
padding:0;
height:calc(100vh - 220px);
min-height:550px;
position:relative;
}

iframe{
width:100%;
height:100%;
border:none;
display:block;
background:#fefefe;
}

/* LOADER */

.loader{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
background:white;
padding:20px 30px;
border-radius:50px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
display:flex;
align-items:center;
gap:15px;
font-weight:500;
color:#4f46e5;
pointer-events:none;
transition:opacity .2s;
}

.loader.hidden{
opacity:0;
visibility:hidden;
}

.spinner{
width:24px;
height:24px;
border:3px solid #e2e8f0;
border-top:3px solid #4f46e5;
border-radius:50%;
animation:spin .8s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* FOOTER */

.footer{
background:#f1f5f9;
padding:1rem;
text-align:center;
color:#475569;
font-size:.85rem;
border-top:1px solid #e2e8f0;
}

/* RESPONSIVE */

@media(max-width:768px){

.header h1{
font-size:1.6rem;
}

.header p{
font-size:.9rem;
}

.tab-btn{
padding:.7rem 1.2rem;
font-size:.85rem;
}

.iframe-container{
height:calc(100vh - 200px);
min-height:450px;
}

.controls{
justify-content:center;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h1>Documentación del Sistema</h1>

<p>Modelado de requisitos - Actores, Casos de Uso y Diagrama UML</p>

<div class="author">
Autor: Ivan Coronado — Cédula: 8-1045-1697
</div>

</div>

<div class="nav-tabs">

<button class="tab-btn active" data-page="actores">
👥 Actores del Sistema
</button>

<button class="tab-btn" data-page="casos">
📝 Casos de Uso
</button>

<button class="tab-btn" data-page="uml">
🔷 Diagrama UML
</button>

</div>

<div class="controls">

<button class="control-btn" id="refreshBtn">
🔄 Recargar
</button>

<button class="control-btn" id="fullscreenBtn">
🖥️ Expandir vista
</button>

</div>

<div class="iframe-container">

<div class="loader" id="loader">
<div class="spinner"></div>
<span>Cargando contenido...</span>
</div>

<iframe id="contentFrame" src="hoja1_actores.html"></iframe>

</div>

<div class="footer">

📌 Navegación integrada • Diseño unificado • Diagramas y especificaciones  
<br><br>
<strong>Ivan Coronado — 8-1045-1697</strong>

</div>

</div>

<script>

const pages={
actores:'hoja1_actores.html',
casos:'hoja2_casos_de_uso.html',
uml:'hoja3_diagrama_uml.html'
};

const iframe=document.getElementById('contentFrame');
const loader=document.getElementById('loader');
const tabs=document.querySelectorAll('.tab-btn');

tabs.forEach(tab=>{
tab.addEventListener('click',function(){

tabs.forEach(t=>t.classList.remove('active'));
this.classList.add('active');

const page=this.dataset.page;

loader.classList.remove('hidden');

iframe.style.opacity='0.5';

iframe.src=pages[page];

});
});

iframe.addEventListener('load',()=>{
loader.classList.add('hidden');
iframe.style.opacity='1';
});

document.getElementById('refreshBtn').onclick=()=>{
iframe.src=iframe.src;
};

document.getElementById('fullscreenBtn').onclick=()=>{
const container=document.querySelector('.iframe-container');

if(!document.fullscreenElement){

container.requestFullscreen().catch(()=>{
window.open(iframe.src,'_blank');
});

}else{

document.exitFullscreen();

}

};

</script>

</body>
</html>
```
